<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signal Bot Dashboard</title>
  <link href="/static/styles.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white p-6">
  <h1 class="text-3xl font-bold mb-6">Signal Bot Dashboard</h1>
  <div id="status" class="mb-4">Bot status: 🔴 Offline</div>
  <div id="signals" class="space-y-4"></div>

  <script>
    const statusEl = document.getElementById("status");
    const signalsEl = document.getElementById("signals");

    let ws = new WebSocket("wss://web-production-8cf9.up.railway.app/ws/signals");

    ws.onopen = () => { statusEl.textContent = "Bot status: 🟢 Online"; }

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      const div = document.createElement("div");
      div.className = "bg-gray-800 p-4 rounded shadow-md";
      div.innerHTML = `
        <h2 class="text-xl font-bold">${data.pair}</h2>
        <p>Signal: <strong>${data.signal}</strong></p>
        <p>Price: <strong>${data.price}</strong></p>
        <p>Timestamp: <code>${data.timestamp}</code></p>
      `;
      signalsEl.prepend(div);
      if (signalsEl.childNodes.length > 20) signalsEl.removeChild(signalsEl.lastChild);
    };

    ws.onclose = () => { statusEl.textContent = "Bot status: 🔴 Offline"; }
  </script>
</body>
</html>
