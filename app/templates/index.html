<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signal Bot Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .signal-card {
            transition: transform 0.2s;
        }
        .signal-card:hover {
            transform: scale(1.02);
        }
        /* Hacer que la imagen de fondo cubra toda la pantalla */
        .full-bg {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body class="relative min-h-screen full-bg"
      style="background-image: url('/static/images/logo.png');">

    <!-- Overlay oscuro para que las tarjetas resalten -->
    <div class="absolute inset-0 bg-black opacity-50 z-0"></div>

    <!-- Contenido principal -->
    <div class="relative z-10 max-w-6xl mx-auto p-6">

        <!-- Header / Panel -->
        <div class="flex justify-end items-center mb-6 space-x-2">
            <button class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded">Start Bot</button>
            <button class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded">Stop Bot</button>
        </div>

        <!-- Contenedor de señales -->
        <div id="signals-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Las tarjetas de señales se insertarán aquí vía WebSocket real -->
        </div>

    </div>

</body>
</html>
