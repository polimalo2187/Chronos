<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Bot Dashboard</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }
        body {
            background-image: url('/static/logo.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: Arial, sans-serif;
        }
        .overlay {
            background-color: rgba(0,0,0,0.4); /* oscurece un poco la imagen */
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #1a73e8;
            color: white;
        }
        button:hover {
            background-color: #1669c1;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="container">
            <h1>Signal Bot Dashboard</h1>
            <button id="startBtn">Start Bot</button>
            <button id="stopBtn">Stop Bot</button>
        </div>
    </div>

    <script>
        document.getElementById("startBtn").onclick = () => {
            alert("Aquí irá la función para arrancar el bot");
        };
        document.getElementById("stopBtn").onclick = () => {
            alert("Aquí irá la función para detener el bot");
        };
    </script>
</body>
</html>
