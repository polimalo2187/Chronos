<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signal Bot Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Opcional: estilos extra para las tarjetas */
        .signal-card {
            transition: transform 0.2s;
        }
        .signal-card:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body class="bg-gray-900 text-white p-6 relative min-h-screen"
      style="background-image: url('/static/images/background.png');
             background-size: cover;
             background-position: center;
             background-repeat: no-repeat;">

    <!-- Overlay oscuro para que las tarjetas resalten -->
    <div class="absolute inset-0 bg-black opacity-50 z-0"></div>

    <!-- Contenido principal -->
    <div class="relative z-10 max-w-6xl mx-auto">

        <!-- Header / Panel -->
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center space-x-4">
                <img src="/static/images/logo.png" class="h-12 w-12" alt="Logo">
                <h1 class="text-4xl font-bold">Signal Bot Dashboard</h1>
            </div>
            <div class="flex space-x-2">
                <button class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded">Start Bot</button>
                <button class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded">Stop Bot</button>
            </div>
        </div>

        <!-- Contenedor de señales -->
        <div id="signals-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Las tarjetas de señales se insertarán aquí vía JavaScript/WebSocket -->
        </div>

    </div>

    <!-- Script para ejemplo de señales dinámicas (simula WebSocket) -->
    <script>
        const container = document.getElementById("signals-container");

        // Función para crear tarjetas
        function addSignal(signal) {
            const card = document.createElement("div");
            card.className = `signal-card p-4 rounded-xl shadow-lg text-white ${
                signal.type === "LONG" ? "bg-green-600" : "bg-red-600"
            }`;

            card.innerHTML = `
                <h2 class="text-2xl font-bold">${signal.pair}</h2>
                <p>Signal: <strong>${signal.type}</strong></p>
                <p>Price: <strong>${signal.price}</strong></p>
                <p>Timestamp: <code>${signal.timestamp}</code></p>
            `;

            container.prepend(card); // Agrega arriba de todo
        }

        // Ejemplo de señales simuladas
        setInterval(() => {
            const now = new Date().toISOString();
            addSignal({
                pair: "BTCUSDT",
                type: Math.random() > 0.5 ? "LONG" : "SHORT",
                price: (42000 + Math.floor(Math.random() * 1000)).toFixed(2),
                timestamp: now
            });
        }, 5000); // Cada 5 segundos
    </script>

</body>
</html>
