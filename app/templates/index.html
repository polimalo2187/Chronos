<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Página de Señales</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* ======================================================
           RESET BÁSICO
        ====================================================== */
        * { box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* ======================================================
           FONDO PRINCIPAL DE LA WEB
        ====================================================== */
        body {
            background-image: url("/static/images/background.jpg");
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow-y: auto; /* PERMITE SCROLL VERTICAL */
        }

        /* ======================================================
           CONTENEDOR GENERAL
        ====================================================== */
        .container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* ======================================================
           BOTONES
           NO SE TOCAN LOS BOTONES NI SU POSICIÓN.
           Solo se asegura que se vean en todos los dispositivos
        ====================================================== */
        button {
            position: absolute;
            min-width: 80px;
            min-height: 40px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        /* ======================================================
           COMPATIBILIDAD MÓVIL
        ====================================================== */
        @media (max-width: 768px) {
            body { background-attachment: scroll; }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- ======================================================
             BOTONES SUPERIOR CENTRO
             Registro y Login
        ====================================================== -->
        <button id="btn-register" style="top: 10px; left: 38%; background-color: #FF6347;">Registro</button>
        <button id="btn-login" style="top: 10px; left: 55%; background-color: #32CD32;">Login</button>

        <!-- ======================================================
             BOTONES SUPERIORES LATERALES
             Señales / Info señal
        ====================================================== -->
        <button id="btn-view-signals" style="top: 60px; left: 5%; background-color: #1E90FF;">Ver Señal</button>
        <button id="btn-signal-info" style="top: 60px; right: 5%; background-color: #FFA500;">Info Señal</button>

        <!-- ======================================================
             BOTONES CENTRO LATERALES
             Referidos / Mi cuenta
        ====================================================== -->
        <button id="btn-referrals" style="top: 50%; left: 5%; background-color: #FF69B4;">Referidos</button>
        <button id="btn-my-account" style="top: 50%; right: 5%; background-color: #8A2BE2;">Mi Cuenta</button>

        <!-- ======================================================
             BOTONES INFERIORES LATERALES
             Planes / Soporte
        ====================================================== -->
        <button id="btn-plans" style="bottom: 60px; left: 5%; background-color: #20B2AA;">Planes</button>
        <button id="btn-support" style="bottom: 60px; right: 5%; background-color: #FF4500;">Soporte</button>

        <!-- ======================================================
             PANEL ADMINISTRADOR (solo administradores)
        ====================================================== -->
        <button id="btn-admin-panel" style="bottom: 10px; left: 50%; transform: translateX(-50%); background-color: #FFD700;">Panel Admin</button>

    </div>
</body>
</html>
