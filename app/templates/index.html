<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulacro Bot Web</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        font-family: Arial, sans-serif;
    }

    body {
        /* Imagen de fondo */
        background: url('app/static/images/background.jpg') no-repeat center center fixed;
        background-size: cover;
        position: relative;
        overflow: hidden;
    }

    button {
        padding: 10px 18px;
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        font-size: 14px;
        min-width: 80px;
        text-align: center;
    }

    /* Registro/Login arriba centro */
    #top-center {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
    }

    /* Esquinas superiores */
    #top-left { position: absolute; top: 60px; left: 10px; }
    #top-right { position: absolute; top: 60px; right: 10px; }

    /* Mitad de la pantalla */
    #middle-left { position: absolute; top: 50%; left: 10px; transform: translateY(-50%); }
    #middle-right { position: absolute; top: 50%; right: 10px; transform: translateY(-50%); }

    /* Parte inferior */
    #bottom-left { position: absolute; bottom: 60px; left: 10px; }
    #bottom-right { position: absolute; bottom: 60px; right: 10px; }

    /* Colores personalizados por función */
    .btn-signals { background-color: #1abc9c; }      /* Verde agua */
    .btn-info-signal { background-color: #3498db; }  /* Azul */
    .btn-myaccount { background-color: #9b59b6; }    /* Morado */
    .btn-referrals { background-color: #e67e22; }    /* Naranja */
    .btn-plans { background-color: #e74c3c; }        /* Rojo */
    .btn-support { background-color: #f1c40f; color: black; } /* Amarillo */
    .btn-register-login { background-color: #2ecc71; } /* Verde más fuerte */
</style>
</head>
<body>

<!-- Registro/Login arriba centro -->
<div id="top-center">
    <button class="btn-register-login" onclick="alert('Registro');">Registro</button>
    <button class="btn-register-login" onclick="alert('Login');">Login</button>
</div>

<!-- Esquinas superiores -->
<div id="top-left">
    <button class="btn-signals" onclick="alert('Señales');">Señales</button>
</div>
<div id="top-right">
    <button class="btn-info-signal" onclick="alert('Info Señal');">Info Señal</button>
</div>

<!-- Mitad de la pantalla -->
<div id="middle-left">
    <button class="btn-referrals" onclick="alert('Referidos');">Referidos</button>
</div>
<div id="middle-right">
    <button class="btn-myaccount" onclick="alert('Mi cuenta');">Mi Cuenta</button>
</div>

<!-- Parte inferior -->
<div id="bottom-left">
    <button class="btn-plans" onclick="alert('Planes');">Planes</button>
</div>
<div id="bottom-right">
    <button class="btn-support" onclick="alert('Soporte');">Soporte</button>
</div>

<!-- Panel de administrador (visible solo para admins, aquí solo de ejemplo) -->
<div id="bottom-center" style="position:absolute; bottom: 20px; left:50%; transform: translateX(-50%);">
    <button class="btn-info-signal" onclick="alert('Panel Administrador');">Panel Admin</button>
</div>

</body>
</html>
